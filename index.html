<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>טופס בקרת חומרי גלם - אדר בצקים</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --red:#B71C1C;
    --red-dark:#7a1010;
    --black:#1a1a1a;
    --gray:#f4f4f4;
    --border:#ddd;
    --ok:#2e7d32;
    --bad:#c62828;
  }
  *{box-sizing:border-box;}
  html,body{
    max-width:100%;
    overflow-x:hidden;
  }
  body{
    font-family:'Segoe UI', Arial, sans-serif;
    background:var(--gray);
    margin:0;
    padding:0;
    color:var(--black);
  }
  header{
    background:linear-gradient(135deg,var(--red),var(--red-dark));
    color:#fff;
    padding:14px 16px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,.25);
  }
  header img.logo{
    height:70px;
    width:70px;
    border-radius:50%;
    background:#fff;
    padding:3px;
    display:block;
    margin:0 auto 8px;
    box-shadow:0 1px 4px rgba(0,0,0,.3);
  }
  header h1{margin:0;font-size:1.3rem;}
  header p{margin:4px 0 0;font-size:.8rem;opacity:.9;}
  .wrap{max-width:900px;width:100%;margin:0 auto;padding:14px;}
  .card{
    background:#fff;
    border-radius:10px;
    padding:16px;
    margin-bottom:16px;
    box-shadow:0 1px 4px rgba(0,0,0,.1);
    max-width:100%;
    min-width:0;
  }
  .card h2{
    font-size:1rem;
    border-right:4px solid var(--red);
    padding-right:10px;
    margin:0 0 14px;
  }
  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    width:100%;
    min-width:0;
  }
  .grid > *{min-width:0;}
  @media(max-width:520px){.grid{grid-template-columns:1fr;}}
  label{
    display:block;
    font-size:.78rem;
    font-weight:600;
    margin-bottom:3px;
    color:#444;
  }
  input,select,textarea{
    width:100%;
    min-width:0;
    max-width:100%;
    padding:8px;
    border:1px solid var(--border);
    border-radius:6px;
    font-size:.9rem;
    font-family:inherit;
    background:#fff;
  }
  input:focus,select:focus,textarea:focus{
    outline:none;
    border-color:var(--red);
  }
  .field{margin-bottom:2px;}
  .full{grid-column:1/-1;}
  .sig-box{
    border:1px solid var(--border);
    border-radius:6px;
    background:#fff;
    touch-action:none;
    max-width:100%;
    height:auto;
    display:block;
  }
  .sig-actions{display:flex;gap:8px;margin-top:6px;}
  .sig-actions button{width:auto;padding:6px 12px;font-size:.75rem;}
  .btnbar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:16px;
  }
  button{
    cursor:pointer;
    border:none;
    border-radius:8px;
    padding:12px 16px;
    font-size:.9rem;
    font-weight:600;
    font-family:inherit;
  }
  .btn-primary{background:var(--red);color:#fff;flex:1;min-width:140px;}
  .btn-primary:hover{background:var(--red-dark);}
  .btn-secondary{background:var(--black);color:#fff;}
  .btn-outline{background:#fff;color:var(--black);border:1px solid var(--border) !important;}
  .btn-danger{background:var(--bad);color:#fff;}
  table{
    width:100%;
    border-collapse:collapse;
    font-size:.72rem;
  }
  th,td{
    border:1px solid var(--border);
    padding:5px 4px;
    text-align:center;
    white-space:nowrap;
  }
  th{background:var(--black);color:#fff;position:sticky;top:0;}
  tbody tr:nth-child(even){background:#fafafa;}
  .table-scroll{overflow-x:auto;max-width:100%;}
  .tag{
    display:inline-block;
    padding:2px 8px;
    border-radius:10px;
    font-size:.68rem;
    font-weight:700;
  }
  .tag-ok{background:#e6f4ea;color:var(--ok);}
  .tag-bad{background:#fdecea;color:var(--bad);}
  .row-actions button{padding:4px 8px;font-size:.68rem;border-radius:5px;}
  .empty{
    text-align:center;
    color:#999;
    padding:30px 10px;
    font-size:.85rem;
  }
  .status-msg{
    margin-top:10px;
    font-size:.8rem;
    padding:8px 10px;
    border-radius:6px;
    display:none;
  }
  .status-msg.show{display:block;}
  .status-ok{background:#e6f4ea;color:var(--ok);}
  .status-err{background:#fdecea;color:var(--bad);}
  .count-badge{
    background:var(--red);
    color:#fff;
    border-radius:10px;
    padding:2px 8px;
    font-size:.7rem;
    margin-right:6px;
  }
</style>
</head>

<script>
// ====== הגדרות (למלא לפני שימוש) ======
const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbxcclnw1-8haLbepKYHmfu7OdWU6HWdsF-wSAWh6NcpfrLTRLhpB16bS5NqUsyueByD-Q/exec";
const FOLDER_ID = "1CBUGGAQaV-KgbXsFwWvURNTBrG4frceq"; // תיקיית "קבלת חומרי גלם" בחשבון ibatsekim
// =======================================

const STORAGE_KEY = "chomarimGlum_records";
let records = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

// ---- חתימה ----
const canvas = document.getElementById("sigCanvas");
const ctx = canvas.getContext("2d");
ctx.lineWidth = 2;
ctx.lineCap = "round";
ctx.strokeStyle = "#1a1a1a";
let drawing = false;

function getPos(e){
  const rect = canvas.getBoundingClientRect();
  const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  const cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
  return {x: cx * (canvas.width/rect.width), y: cy * (canvas.height/rect.height)};
}
function startDraw(e){ drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); }
function moveDraw(e){ if(!drawing) return; const p = getPos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); e.preventDefault(); }
function endDraw(){ drawing = false; }

canvas.addEventListener("mousedown", startDraw);
canvas.addEventListener("mousemove", moveDraw);
window.addEventListener("mouseup", endDraw);
canvas.addEventListener("touchstart", startDraw, {passive:false});
canvas.addEventListener("touchmove", moveDraw, {passive:false});
canvas.addEventListener("touchend", endDraw);

document.getElementById("clearSig").addEventListener("click", ()=>{
  ctx.clearRect(0,0,canvas.width,canvas.height);
});

function isCanvasBlank(c){
  const blank = document.createElement("canvas");
  blank.width = c.width; blank.height = c.height;
  return c.toDataURL() === blank.toDataURL();
}

// ---- עזר ----
function showMsg(el, text, ok){
  el.textContent = text;
  el.className = "status-msg show " + (ok ? "status-ok" : "status-err");
  setTimeout(()=>{ el.classList.remove("show"); }, 4000);
}

function tagHtml(val){
  const isOk = (val === "תקין" || val === "תקינה" || val === "קיימים");
  return `<span class="tag ${isOk ? "tag-ok":"tag-bad"}">${val}</span>`;
}

// ---- שמירה/טעינה ----
function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
  render();
}

function render(){
  const body = document.getElementById("recBody");
  const emptyMsg = document.getElementById("emptyMsg");
  document.getElementById("recCount").textContent = records.length;
  body.innerHTML = "";
  if(records.length === 0){
    emptyMsg.style.display = "block";
    return;
  }
  emptyMsg.style.display = "none";
  records.forEach((r, i)=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${r.date||""}</td><td>${r.time||""}</td><td>${r.supplier||""}</td>
      <td>${r.material||""}</td><td>${r.batch||""}</td><td>${r.expiry||""}</td>
      <td>${r.qty||""}</td><td>${r.packCondition||""}</td>
      <td>${tagHtml(r.cleanliness||"")}</td><td>${tagHtml(r.docs||"")}</td>
      <td>${tagHtml(r.approval||"")}</td><td>${tagHtml(r.status||"")}</td>
      <td>${r.notes||""}</td><td>${r.inspector||""}</td>
      <td class="row-actions"><button class="btn-danger" onclick="deleteRecord(${i})">מחק</button></td>
    `;
    body.appendChild(tr);
  });
}

function deleteRecord(i){
  if(confirm("למחוק את הרשומה?")){
    records.splice(i,1);
    save();
  }
}
window.deleteRecord = deleteRecord;

// ---- הוספת רשומה ----
document.getElementById("addBtn").addEventListener("click", ()=>{
  const rec = {
    date: document.getElementById("f_date").value,
    time: document.getElementById("f_time").value,
    supplier: document.getElementById("f_supplier").value.trim(),
    material: document.getElementById("f_material").value.trim(),
    batch: document.getElementById("f_batch").value.trim(),
    expiry: document.getElementById("f_expiry").value,
    qty: document.getElementById("f_qty").value.trim(),
    packCondition: document.getElementById("f_pack_condition").value,
    cleanliness: document.getElementById("f_cleanliness").value,
    docs: document.getElementById("f_docs").value,
    approval: document.getElementById("f_approval").value,
    status: document.getElementById("f_status").value,
    notes: document.getElementById("f_notes").value.trim(),
    inspector: document.getElementById("f_inspector").value.trim(),
    signature: isCanvasBlank(canvas) ? "" : canvas.toDataURL("image/png")
  };

  if(!rec.date || !rec.supplier || !rec.material){
    showMsg(document.getElementById("formStatus"), "נא למלא לפחות תאריך, ספק וחומר גלם", false);
    return;
  }

  records.push(rec);
  save();
  showMsg(document.getElementById("formStatus"), "הרשומה נוספה בהצלחה ✔", true);

  // איפוס הטופס
  ["f_date","f_time","f_supplier","f_material","f_batch","f_expiry","f_qty","f_notes","f_inspector"]
    .forEach(id=>{ document.getElementById(id).value = ""; });
  document.getElementById("f_pack_condition").selectedIndex = 0;
  document.getElementById("f_cleanliness").selectedIndex = 0;
  document.getElementById("f_docs").selectedIndex = 0;
  document.getElementById("f_approval").selectedIndex = 0;
  document.getElementById("f_status").selectedIndex = 0;
  ctx.clearRect(0,0,canvas.width,canvas.height);
});

// ---- ניקוי הכל ----
document.getElementById("clearAllBtn").addEventListener("click", ()=>{
  if(confirm("למחוק את כל הרשומות? פעולה זו בלתי הפיכה.")){
    records = [];
    save();
  }
});

// ---- ייצוא לאקסל ----
function buildSheetData(){
  const headers = ["תאריך","שעה","ספק","חומר גלם","מס' אצוות ספק","תאריך תפוגה","כמות",
    "מצב אריזה","ניקיון","מסמכים נלווים","אישור","סטטוס","הערות","שם הבודק"];
  const rows = records.map(r=>[
    r.date, r.time, r.supplier, r.material, r.batch, r.expiry, r.qty,
    r.packCondition, r.cleanliness, r.docs, r.approval, r.status, r.notes, r.inspector
  ]);
  return [headers, ...rows];
}

document.getElementById("exportBtn").addEventListener("click", ()=>{
  if(records.length === 0){
    showMsg(document.getElementById("sendStatus"), "אין רשומות לייצוא", false);
    return;
  }
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(buildSheetData());
  ws["!cols"] = [{wch:11},{wch:8},{wch:16},{wch:16},{wch:14},{wch:12},{wch:12},
    {wch:10},{wch:10},{wch:12},{wch:10},{wch:10},{wch:24},{wch:16}];
  XLSX.utils.book_append_sheet(wb, ws, "בקרת חומרי גלם");
  const dateStr = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `בקרת_חומרי_גלם_${dateStr}.xlsx`);
});

// ---- שליחה לדרייב ----
document.getElementById("sendBtn").addEventListener("click", ()=>{
  const statusEl = document.getElementById("sendStatus");

  if(WEBHOOK_URL.indexOf("PASTE_") === 0 || FOLDER_ID.indexOf("PASTE_") === 0){
    showMsg(statusEl, "יש להגדיר קודם את WEBHOOK_URL ו-FOLDER_ID בקוד הטופס", false);
    return;
  }
  if(records.length === 0){
    showMsg(statusEl, "אין רשומות לשליחה", false);
    return;
  }

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(buildSheetData());
  XLSX.utils.book_append_sheet(wb, ws, "בקרת חומרי גלם");
  const base64 = XLSX.write(wb, {type:"base64", bookType:"xlsx"});
  const dateStr = new Date().toISOString().slice(0,10);
  const fileName = `בקרת_חומרי_גלם_${dateStr}.xlsx`;

  fetch(WEBHOOK_URL, {
    method: "POST",
    mode: "no-cors",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      folderId: FOLDER_ID,
      fileName: fileName,
      fileData: base64
    })
  }).then(()=>{
    // no-cors לא מחזיר תשובה קריאה - יש לבדוק ב-Executions log של ה-Apps Script
    showMsg(statusEl, "הקובץ נשלח (נא לוודא בלוג ה-Apps Script שההעלאה הצליחה) ☁️", true);
  }).catch(()=>{
    showMsg(statusEl, "שגיאה בשליחה - בדקו את החיבור לרשת", false);
  });
});

render();
</script>

</html>
